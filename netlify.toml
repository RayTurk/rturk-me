[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# www → apex
[[redirects]]
  from = "https://www.rturk.me/*"
  to = "https://rturk.me/:splat"
  status = 301
  force = true

# New URL structure (spec: /projects→/work, /blog→/writing)
[[redirects]]
  from = "/projects/*"
  to = "/work/:splat"
  status = 301

[[redirects]]
  from = "/projects"
  to = "/work"
  status = 301

[[redirects]]
  from = "/blog/*"
  to = "/writing/:splat"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/writing"
  status = 301

# Retired sections
[[redirects]]
  from = "/services/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/services"
  to = "/"
  status = 301

[[redirects]]
  from = "/audit"
  to = "/"
  status = 301

# Legacy WordPress paths (carried from old config, retargeted)
[[redirects]]
  from = "/feed"
  to = "/writing"
  status = 301

[[redirects]]
  from = "/feed/"
  to = "/writing"
  status = 301

[[redirects]]
  from = "/category/*"
  to = "/writing"
  status = 301

[[redirects]]
  from = "/tag/*"
  to = "/writing"
  status = 301

[[redirects]]
  from = "/author/*"
  to = "/about"
  status = 301

[[redirects]]
  from = "/wp-json/*"
  to = "/"
  status = 410

[[redirects]]
  from = "/xmlrpc.php"
  to = "/"
  status = 410

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Immutable static assets
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
